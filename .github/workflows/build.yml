name: Build
'on':
  workflow_dispatch: {}
  workflow_run:
    workflows:
    - Health Check
    types:
    - completed
    branches:
    - main
permissions: {}
run-name: Build
defaults:
  run:
    shell: bash
env:
  PYTHONDONTWRITEBYTECODE: 1
  UV_NO_SYNC: 1
jobs:
  artifacts:
    strategy:
      matrix:
        os:
        - ubuntu-latest
        - windows-latest
        - macos-latest
      fail-fast: true
    runs-on: ${{ matrix.os }}
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event
      != 'schedule' }}
    steps:
    - name: Checkout Repository
      id: checkout-repository
      uses: actions/checkout@main
    - name: Setup Version Control
      id: setup-version-control
      run: git config --global user.email "github-actions[bot]@users.noreply.github.com"
        && git config --global user.name "github-actions[bot]"
    - name: Setup Package Manager
      id: setup-package-manager
      uses: astral-sh/setup-uv@main
      with:
        python-version: '3.12'
    - name: Patch Version
      id: patch-version
      run: uv version --bump patch
    - name: Add Version Bump To Version Control
      id: add-version-bump-to-version-control
      run: git add pyproject.toml uv.lock
    - name: Update Dependencies
      id: update-dependencies
      run: uv lock --upgrade
    - name: Install Dependencies
      id: install-dependencies
      run: uv sync
    - name: Pre Install Pygame From Binary
      id: pre-install-pygame-from-binary
      run: 'uv pip install pygame --only-binary=:all:'
    - name: Add Dependency Updates To Version Control
      id: add-dependency-updates-to-version-control
      run: git add pyproject.toml uv.lock
    - name: Build Artifacts
      id: build-artifacts
      run: uv run pyrig build
    - name: Upload Artifacts
      id: upload-artifacts
      uses: actions/upload-artifact@main
      with:
        name: notty-${{ runner.os }}
        path: dist
  container-image:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event
      != 'schedule' }}
    steps:
    - name: Checkout Repository
      id: checkout-repository
      uses: actions/checkout@main
    - name: Setup Version Control
      id: setup-version-control
      run: git config --global user.email "github-actions[bot]@users.noreply.github.com"
        && git config --global user.name "github-actions[bot]"
    - name: Setup Package Manager
      id: setup-package-manager
      uses: astral-sh/setup-uv@main
      with:
        python-version: '3.12'
    - name: Patch Version
      id: patch-version
      run: uv version --bump patch
    - name: Add Version Bump To Version Control
      id: add-version-bump-to-version-control
      run: git add pyproject.toml uv.lock
    - name: Install Container Engine
      id: install-container-engine
      uses: redhat-actions/podman-install@main
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
    - name: Make Distribution Directory
      id: make-distribution-directory
      run: mkdir -p dist
    - name: Build Container Image
      id: build-container-image
      run: podman build -t notty .
    - name: Save Container Image
      id: save-container-image
      run: podman save -o dist/notty.tar notty
    - name: Upload Artifacts
      id: upload-artifacts
      uses: actions/upload-artifact@main
      with:
        name: container-image
        path: dist
