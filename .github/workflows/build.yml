name: Build
'on':
  workflow_dispatch: {}
  workflow_run:
    workflows:
    - Health Check
    types:
    - completed
    branches:
    - main
run-name: Build
defaults:
  run:
    shell: bash
env:
  PYTHONDONTWRITEBYTECODE: 1
  UV_NO_SYNC: 1
jobs:
  artifacts:
    strategy:
      matrix:
        os:
        - ubuntu-latest
        - windows-latest
        - macos-latest
      fail-fast: true
    runs-on: ${{ matrix.os }}
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event
      != 'schedule' }}
    steps:
    - name: Checkout Repository
      id: checkout-repository
      uses: actions/checkout@main
    - name: Setup Package Manager
      id: setup-package-manager
      uses: astral-sh/setup-uv@main
      with:
        python-version: '3.12'
    - name: Install Dependencies
      id: install-dependencies
      run: uv sync
    - name: Pre Install Pygame From Binary
      id: pre-install-pygame-from-binary
      run: 'uv pip install pygame --only-binary=:all:'
    - name: Build Artifacts
      id: build-artifacts
      run: uv run pyrig build
    - name: Upload Artifacts
      id: upload-artifacts
      uses: actions/upload-artifact@main
      with:
        name: notty-${{ runner.os }}
        path: dist
