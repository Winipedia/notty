[project]
name = "notty"
version = "0.21.0"
description = "A simple card game called Notty using Pygame"
readme = "README.md"
requires-python = ">=3.12,<3.13"
dependencies = [
    "platformdirs>=4.10.0",
    "pygame>=2.6.1",
    "pyrig>=15.28.0",
    "pyrig-runtime",
]
license-files = [
    "LICENSE",
]
license = "MIT"

[[project.authors]]
name = "Winipedia"

[[project.authors]]
name = "Azeez"

[[project.authors]]
name = "Hanmiao chen"

[[project.maintainers]]
name = "Winipedia"

[project.scripts]
notty = "pyrig_runtime.rig.cli.main:main"

[project.urls]
Homepage = "https://github.com/Winipedia/notty"
Documentation = "https://Winipedia.github.io/notty"
Source = "https://github.com/Winipedia/notty"
Issues = "https://github.com/Winipedia/notty/issues"
Changelog = "https://github.com/Winipedia/notty/releases"

[dependency-groups]
dev = [
    "bandit>=1.9.3",
    "deptry>=0.25.1",
    "mkdocs-material>=9.7.1",
    "mkdocs-mermaid2-plugin>=1.2.3",
    "mkdocs>=1.6.1",
    "mkdocstrings[python]>=1.0.3",
    "mypy>=1.19.1",
    "pillow>=12.2.0",
    "pip-audit>=2.10.0",
    "prek>=0.3.2",
    "pyinstaller>=6.21.0",
    "pyrig",
    "pyrig-codecov>=1.0.0",
    "pyrig-executables>=1.6.0",
    "pytest-cov>=7.0.0",
    "pytest>=9.0.2",
    "ruff>=0.15.0",
    "rumdl>=0.1.17",
    "ty",
    "typos>=1.47.2",
]

[build-system]
requires = [
    "uv_build",
]
build-backend = "uv_build"

[tool.ruff.lint]
select = [
    "ALL",
]
ignore = [
    "COM812",
    "ANN401",
]
fixable = [
    "ALL",
]

[tool.ruff.lint.per-file-ignores]
"**/tests/**/*.py" = [
    "S101",
]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.pytest.ini_options]
testpaths = [
    "tests",
]
addopts = "--cov=notty --cov-branch --cov-report=term-missing --cov-fail-under=0 --cov-report=xml"

[tool.bandit.assert_used]
skips = [
    "*/tests/*.py",
    "*/test_*/*.py",
]

[tool.mypy]
strict = true
warn_unreachable = true
show_error_codes = true
files = "."

[tool.deptry]
root = "src"

[tool.deptry.per_rule_ignores]
DEP002 = [
    "pyrig-runtime",
]

[tool.ty.terminal]
error-on-warning = true
